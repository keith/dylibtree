name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.1)"
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install targets
      run: |
        rustup target add x86_64-apple-darwin
        rustup target add aarch64-apple-darwin

    - name: Build
      run: ./release-build.sh
      env:
        DYLIBTREE_VERSION: ${{ inputs.version }}

    - name: Attest
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: dylibtree-${{ inputs.version }}.tar.gz

    - name: Create release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ inputs.version }}" dylibtree-${{ inputs.version }}.tar.gz \
          --title "${{ inputs.version }}" \
          --generate-notes \
          --latest
